services:
    postgis: 
        container_name: pgis
        image: transit-postgis
        build:
            context: .
            dockerfile: ./db/Dockerfile
        env_file:
            - .env
        ports: 
            - "4321:5432"
        volumes: 
            - postgis_data:/var/lib/postgresql
            - ./scr:/scr:ro
            - ./db/initdb:/docker-entrypoint-initdb.d:ro
            - ./db/dump:/dump
            - ./db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]

    # one-off containers for importing data into db
    gtfs: 
        container_name: gtfs-import
        build:
            context: .
            dockerfile: ./db/gtfs.Dockerfile
        env_file:
            - .env
        volumes:
            - ./scr/gtfs:/scr/gtfs:ro
        entrypoint: [ "scr/gtfs" ]

    api:
        container_name: transit-api
        depends_on:
            postgis:
                condition: service_healthy
        image: transit-go-api
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        restart: unless-stopped
        volumes: 
            - ./data/persist.json:/app/data/persist.json
            - ./data/cycle_osm.geojson:/app/data/cycle_osm.geojson
    
    proxy:
        container_name: transit-proxy
        depends_on:
            api:
                condition: service_healthy
        image: transit-nginx-proxy
        build: 
            context: .
            dockerfile: ./nginx/Dockerfile
        ports: 
            - "3333:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./www/index.html:/var/www/index.html:ro
            - ./www/css:/var/www/css:ro
volumes: 
    postgis_data:
